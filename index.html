<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 로또 추첨기 </title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎱 로또 추첨기 </h1>

<!-- 움직이는 공 -->
<div id="machine">
    <canvas id="canvas" width="700" height="250"></canvas>
</div>

<div class="panel">

    <button id="drawBtn">🎲 추첨하기</button>

    <button id="resetBtn">🔄 새 게임</button>

</div>

<div id="info">

    <h2>현재 상태</h2>

    <p>
        회차 :
        <span id="round">1</span>
        /
        8
    </p>

    <p>
        남은 공 :
        <span id="remain">45</span>개
    </p>

</div>

<hr>

<h2>이번 추첨</h2>

<div id="result"></div>

<hr>

<h2>추첨 기록</h2>

<div id="history"></div>

<script src="script.js"></script>

</body>
</html>
